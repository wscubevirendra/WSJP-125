<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        button {
            background: brown;
            padding: 10px 25px;
            color: white;
            border: none;
            border-radius: 15px;
            margin: 100px;
            position: relative;

        }

        .wave {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: brown;
            opacity: 0.6;
            border-radius: 15px;
            z-index: -1;
            animation: demo 2s infinite linear;
        }

        @keyframes demo {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(2);

            }

            100% {
                transform: scale(1);

            }
        }
    </style>
</head>

<body>
    <button> Enquire Now <div class="wave"></div> </button>

</body>

</html>
