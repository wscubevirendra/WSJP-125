<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background-image: linear-gradient(to bottom, #2980b9, #3498db);
            background-size: cover;
            overflow: hidden;

        }

        .main {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .box {
            position: absolute;
            bottom: -50%;
            /* border-radius: 50%; */
            box-shadow: inset 0 0 25px rgba(26, 190, 232, 0.4), inset -5px -10px 35px rgba(255, 255, 255, 0.777);
            animation: move 4s infinite alternate linear;
        }

        .box:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 10%;
            animation-duration: 2s;
        }

        .box:nth-child(2) {
            width: 100px;
            height: 100px;
            left: 25%;
            animation-duration: 5s;


        }

        .box:nth-child(3) {
            width: 150px;
            height: 150px;
            left: 40%;
            animation-duration: 3s;


        }

        .box:nth-child(4) {
            width: 200px;
            height: 200px;
            left: 60%;
            animation-duration: 6s;


        }

        .box:nth-child(5) {
            width: 30px;
            height: 30px;
            left: 90%;
            animation-duration: 3s;


        }


        @keyframes move {
            0% {
                transform: translate(0px, 0px) rotate(0);
            }

            60% {
                transform: translate(300px, -500px) rotate(180deg) scale(1.2);
            }

            100% {
                transform: translate(0px, -800px) rotate(360deg) scale(0.6);
            
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>

    </div>

</body>

</html>
