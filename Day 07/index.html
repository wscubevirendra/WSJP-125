<!DOCTYPE html>
<html lang="en">

<head>
    <title>Padding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 900px;
            height: 300px;
            border: 2px solid red;
            margin: auto;
        }

        .box {
            width: 200px;
            height: 200px;
            border: 2px solid green;
            float: left;
            margin: 40px;
            text-align: center;
            font-size: 100px;
            padding-top: 30px;

        }
    </style>
</head>

<body>
    <h1>WsCube Tech</h1>
    <ul>
        <li>Item1</li>
        <li>Item1</li>
        <li>Item1</li>
    </ul>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>

    </div>


</body>

</html>
