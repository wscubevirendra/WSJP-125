<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 350px;
            height: 350px;
            border: 1px solid red;
            margin: 50px auto;
            position: relative;
            overflow: hidden;


        }

        .overlay1 {
            width: 50%;
            height: 100%;
            position: absolute;
            transition: 300ms;
            background-color: rgba(255, 0, 0, 0.8);
            top: 0;
            left: 0;
        }

        .overlay2 {
            width: 50%;
            height: 100%;
            position: absolute;
            transition: 300ms;
            background-color: rgba(0, 255, 0, 0.8);
            top: 0;
            right: 0;
        }

        .overlay3 {
            width: 100%;
            height: 100%;
            position: absolute;
            transition: 300ms;
            left: 0;
            bottom: 0%;
            background-color: rgba(0, 0, 00, 0.8);
            opacity: 0;

        }

        .card:hover .overlay1 {
            left: 100%;
        }


        .card:hover .overlay2 {
            right: 100%;
        }

        .card:hover .overlay3 {

            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://image.tmdb.org/t/p/w1280/z2tqCJLsw6uEJ8nJV8BsQXGa3dr.jpg" width="100%" height="100%" alt="">
        <div class="overlay1"></div>
        <div class="overlay2"></div>
        <div class="overlay3"></div>
    </div>

</body>

</html>
