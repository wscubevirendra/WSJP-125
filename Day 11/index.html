<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 350px;
            height: 350px;
            border: 1px solid red;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
        }

        .overlay {
            width: 100%;
            background-color: white;
            box-shadow: 1px 1px 1px gray;
            padding: 4px;
            position: absolute;
            bottom: -200px;
            left: -100%;
            transition: 500ms;
        }

        .card:hover .overlay{
            bottom: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://image.tmdb.org/t/p/w1280/z2tqCJLsw6uEJ8nJV8BsQXGa3dr.jpg" width="100%" height="100%" alt="">
        <div class="overlay">
            <h4>Greenland 2: Migration</h4>
            <p>
                <b>Overview:</b>
                Having found the safety of the Greenland bunker after the comet Clarke decimated the Earth, the Garrity
                family must now risk everything to embark on a perilous journey across the wasteland of Europe to find a
                new home.
            </p>
        </div>
    </div>

</body>

</html>
