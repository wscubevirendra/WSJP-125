<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 800px;
            height: 400px;
            border: 2px solid red;
            margin:50px auto;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: green;
            transform: translateX(0px);
            transition: 1s;
        }

        .container:hover .box{
            /* transform: translateX(700px);
            transform: translateY(300px); */
            transform: translate(700px,300px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
      

    </div>

</body>

</html>
