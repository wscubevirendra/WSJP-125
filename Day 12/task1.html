<!DOCTYPE html>
<html lang="en">
<head>
  
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dot{
            width: 20px;
            height: 20px;
            border-radius: 50%;
           background-color: red;
           transition: 400ms;
        }

        .box:hover .dot{
            transform: translate(100px,-100px);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="dot"></div>

    </div>
    
</body>
</html>
