<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .card {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            margin: 100px auto;
            transition: 300ms;
            /* border-radius: 50%; */
            position: relative;

        }

        .box {
            width: 30px;
            height: 30px;
            background-color: red;
            position: absolute;
            top: 25px;
            border-radius: 50%;

        }

        .card:hover {
            transform: rotate(360deg);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="box"></div>
    </div>

</body>

</html>
