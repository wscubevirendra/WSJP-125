<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .box {
            width: 400px;
            height: 400px;
            border: 2px solid red;
            margin: 100px auto;
            overflow: hidden;
            transform-origin: left center;
        }

        .box img{
            transition: 400ms;

        }

        .box:hover img{
            transform: scale(3);
        }
    </style>
</head>

<body>
    <div class="box">
        <img src="https://picsum.photos/400/400" width="100%" height="100%" alt="">
    </div>

</body>

</html>
