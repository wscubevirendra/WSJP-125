<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .circle {
            width: 200px;
            height: 200px;
            border: 10px solid red;
            margin: 50px auto;
            /* border-radius: 50%; */
            position: relative;
            animation: move 4s infinite linear;

        }

        .dot {
            position: absolute;
            top: 0px;
            left: 4px;
            width: 50px;
            height: 50px;
            background-color: yellow;
            border-radius: 50%;

        }

        @keyframes move {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);

            }
        }
    </style>
</head>

<body>
    <div class="circle">
        <div class="dot"></div>

    </div>

</body>

</html>
