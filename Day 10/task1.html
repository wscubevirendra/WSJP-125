<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .container {
            width: 800px;
            height: 400px;
            border: 2px solid red;
            margin: 50px auto;
            position: relative;
        }

        .box {
            width: 100px;
            height: 100px;
            position: absolute;
            transition: 1s;
        }

        .box:nth-child(1) {
            top: 0;
            left: 0;
            background-color: green;
        }

        .box:nth-child(2) {
            top: 0;
            left: 700px;
            background-color: yellow;
        }


        .container:hover .box:nth-child(1) {
            left: 700px;
          
        }

          .container:hover .box:nth-child(2) {
            left: 0px;
          
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>

    </div>

</body>

</html>
