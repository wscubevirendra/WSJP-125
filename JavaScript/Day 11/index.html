<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        .demo {
            background-color: red;
        }
    </style>
    <style>
        .container {
            width: 800px;
            height: 300px;
            margin: 60px auto;
            border: 2px double red;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .card {
            width: 150px;
            height: 150px;
            border: 2px solid green;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        button {
            display: block;
            margin: auto;
            background-color: yellow;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div onclick="styleChange(this)" class="card">1</div>
        <div onclick="styleChange(this)" class="card">2</div>
        <div onclick="styleChange(this)" class="card">3</div>
        <div onclick="styleChange(this)" class="card">4</div>
    </div>
    <script>
        function styleChange(card) {
            card.style.background="red"
        }

    </script>
</body>

</html>
