<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
        }

        .input-container {
            text-align: center;
        }

        .input-container input {
            width: 600px;
            padding: 10px;
            border-radius: 20px;
            outline: none;
            margin: 10px;

        }

        .movies-container {
            width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            width: calc(25% - 20px);
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
        }

        .overlay {
            width: 100%;
            padding: 10px;
            background-color: white;
            position: absolute;
            bottom: -100%;
            transition: 1s;
        }

        .card:hover .overlay {
            bottom: 0px;
        }
    </style>
</head>

<body>
    <div class="input-container">
        <input type="text" placeholder="Search Movie....">
    </div>
    <div class="movies-container"></div>

    <script src="js/app.js"></script>


</body>

</html>
