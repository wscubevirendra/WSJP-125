<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 200px;
            padding: 20px;
            box-shadow: 0px 2px 2px gray;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 100px auto;
        }
    </style>
</head>

<body>

    <div class="card">
        <button>Start</button>
        <h2></h2>
        <button>Stop</button>
    </div>

    <script>
        var btn = document.querySelectorAll("button");
        var h2 = document.querySelector("h2")
        var count = 0;
        var myInterval = ""
        btn[0].addEventListener(
            "click",
            function () {
                myInterval = setInterval(
                    function () {
                        count++;
                        h2.innerText = count
                    },
                    1000
                )
                btn[0].disabled = true

            }
        )


        btn[1].addEventListener(
            "click",
            function () {

                clearInterval(
                    myInterval
                )
                btn[0].disabled=false
            }
        )

    </script>
</body>

</html>
