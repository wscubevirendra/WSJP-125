<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            row-gap: 30px;
            column-gap: 10px;
        }

        .card {
            width: calc(300px - 10px);
            height: 250px;
            box-shadow: 0px 0px 2px 2px gray;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: #ff7b00;

        }

        .card img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="container"> </div>



    <script>
        async function getProducts() {
            var response = await fetch("https://dummyjson.com/products"); //wait paused
            var data = await response.json()
            for (let product of data.products) {
                var div = document.createElement("div");
                div.classList.add("card");
                div.innerHTML = ` <img src=${product.thumbnail} alt="">
            <h5>${product.title}</h5>`;
                document.querySelector(".container").appendChild(div)


            }

        }

        getProducts();
    </script>
</body>

</html>
