<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 1100px;
            margin: 50px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;

        }

        .card {
            width: 250px;
            height: 250px;
            border-radius: 20px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <button>Click</button>

    <div class="container">


    </div>

    <script>
        var btn = document.querySelector("button");
        var container = document.querySelector(".container");
        btn.addEventListener(
            "click",
            function () {
                for (var i = 1; i <= 10; i++) {
                    var div = document.createElement("div");
                    div.classList.add("card")
                    div.innerHTML = ` <img src="https://picsum.photos/200/200?random=${i}">`
                    container.appendChild(div)
                }

            }
        )



    </script>
</body>

</html>
