<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .gallery {
            width: 1000px;
            height: 500px;
            /* border: 2px solid red; */
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
        }

        .gallery img {
            width: 270px;
            height: 200px;
            border-radius: 30px;

        }

        .gallery img:hover {
            box-shadow: 2px 3px 2px 2px red;
            transition: 400ms;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #overlay img {
            width: 500px;
            height: 400px;
            margin: auto;
        }

        #closeBtn {
            margin: 10px;
            background-color: brown;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="gallery">
        <img src="https://picsum.photos/200/200?random=1">
        <img src="https://picsum.photos/200/200?random=2">
        <img src="https://picsum.photos/200/200?random=3">
        <img src="https://picsum.photos/200/200?random=4">
        <img src="https://picsum.photos/200/200?random=5">
        <img src="https://picsum.photos/200/200?random=6">
    </div>
    <div id="overlay">
        <img src="" alt="">
        <button id="closeBtn">Close</button>
    </div>

    <script>
        var images = document.querySelectorAll(".gallery img");
        var main = document.querySelector("#overlay img");
        var overlay = document.querySelector("#overlay");
        var closeBtn = document.querySelector("#closeBtn");
        for (let img of images) {
            img.addEventListener("click", function (event) {
                main.src = img.src;
                overlay.style.display = "flex";

            })
        }

        closeBtn.addEventListener("click", function () {
            overlay.style.display = "none";
        })

        overlay.addEventListener("click",function(){
            overlay.style.display = "none";

        })
    </script>


</body>

</html>
