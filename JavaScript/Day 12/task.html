<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 1000px;
            height: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            margin: 100px auto;
            border: 2px solid green;

        }

        .left {
            width: 20%;
            height: 100%;
        }

        .right {
            width: 80%;
            height: 100%;
        }

        .card {
            width: 100px;
            height: 50px;
            background-color: #7b7b7b;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <div class="card">
                <img onclick="swap(this)" src="https://picsum.photos/200/300?random=1" alt="">
            </div>
            <div class="card">
                <img onclick="swap(this)" src="https://picsum.photos/200/300?random=2" alt="">
            </div>
            <div class="card">
                <img onclick="swap(this)" src="https://picsum.photos/200/300?random=3" alt="">
            </div>
            <div class="card">4
                <img onclick="swap(this)" src="https://picsum.photos/200/300?random=4" alt="">

            </div>
            <div class="card">
                <img onclick="swap(this)" src="https://picsum.photos/200/300?random=5" alt="">
            </div>
        </div>
        <div class="right">
            <img src="https://picsum.photos/200/300?random=5" alt="">
        </div>
    </div>

    <script>
        var main = document.querySelector(".right img");

        function swap(image) {
            main.src = image.src
        }

    </script>




</body>

</html>
